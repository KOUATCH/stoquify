name: AqStoqFlow Release Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

concurrency:
  group: aqstoqflow-release-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Repo
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/aqstoqflow_ci
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Release Gates
        run: npm run verify:repo
